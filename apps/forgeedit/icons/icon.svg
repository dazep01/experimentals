<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#9333ea"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="512" height="256" rx="100" ry="100" fill="url(#shine)" opacity="0.4"/>
  <!-- Code brackets -->
  <g filter="url(#shadow)" transform="translate(256,256)">
    <!-- Left bracket < -->
    <path d="M-60,-80 L-120,0 L-60,80" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right bracket > -->
    <path d="M60,-80 L120,0 L60,80" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Center line / -->
    <line x1="20" y1="-95" x2="-20" y2="95" stroke="white" stroke-width="24" stroke-linecap="round" filter="url(#glow)"/>
  </g>
  <!-- Small accent dots -->
  <circle cx="384" cy="128" r="12" fill="rgba(255,255,255,0.5)"/>
  <circle cx="128" cy="384" r="8" fill="rgba(255,255,255,0.35)"/>
</svg>
