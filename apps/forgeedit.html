<script type="module">
    // ================================================================
    //  ForgeEdit – Mobile-First Multifunction Editor (with CodeMirror)
    //  Dependencies: CodeMirror 6, markdown‑it, highlight.js, DOMPurify
    // ================================================================
    import { basicSetup } from 'https://esm.sh/@codemirror/basic-setup@0.20.0';
    import { EditorView, keymap, lineNumbers, highlightActiveLine, drawSelection } from 'https://esm.sh/@codemirror/view@0.20.0';
    import { EditorState, Compartment } from 'https://esm.sh/@codemirror/state@0.20.0';
    import { oneDark } from 'https://esm.sh/@codemirror/theme-one-dark@0.20.0';
    import { html } from 'https://esm.sh/@codemirror/lang-html@0.20.0';
    import { css } from 'https://esm.sh/@codemirror/lang-css@0.20.0';
    import { javascript } from 'https://esm.sh/@codemirror/lang-javascript@0.20.0';
    import { python } from 'https://esm.sh/@codemirror/lang-python@0.20.0';
    import { json } from 'https://esm.sh/@codemirror/lang-json@0.20.0';
    import { xml } from 'https://esm.sh/@codemirror/lang-xml@0.20.0';
    import { yaml } from 'https://esm.sh/@codemirror/lang-yaml@0.20.0';
    import { markdown, markdownLanguage } from 'https://esm.sh/@codemirror/lang-markdown@0.20.0';
    import MarkdownIt from 'https://esm.sh/markdown-it@13.0.1';
    import hljs from 'https://esm.sh/highlight.js@11.8.0/lib/core';
    import javascriptHL from 'https://esm.sh/highlight.js@11.8.0/lib/languages/javascript';
    import pythonHL from 'https://esm.sh/highlight.js@11.8.0/lib/languages/python';
    import xmlHL from 'https://esm.sh/highlight.js@11.8.0/lib/languages/xml';
    import cssHL from 'https://esm.sh/highlight.js@11.8.0/lib/languages/css';
    import jsonHL from 'https://esm.sh/highlight.js@11.8.0/lib/languages/json';
    import yamlHL from 'https://esm.sh/highlight.js@11.8.0/lib/languages/yaml';
    import markdownHL from 'https://esm.sh/highlight.js@11.8.0/lib/languages/markdown';
    import DOMPurify from 'https://esm.sh/dompurify@3.0.6';

    // Daftarkan bahasa highlight.js
    hljs.registerLanguage('javascript', javascriptHL);
    hljs.registerLanguage('js', javascriptHL);
    hljs.registerLanguage('python', pythonHL);
    hljs.registerLanguage('py', pythonHL);
    hljs.registerLanguage('xml', xmlHL);
    hljs.registerLanguage('html', xmlHL);
    hljs.registerLanguage('css', cssHL);
    hljs.registerLanguage('json', jsonHL);
    hljs.registerLanguage('yaml', yamlHL);
    hljs.registerLanguage('yml', yamlHL);
    hljs.registerLanguage('markdown', markdownHL);
    hljs.registerLanguage('md', markdownHL);

    // Inisialisasi markdown-it dengan highlight.js dan plugin
    const md = new MarkdownIt({
        html: false,        // Disable raw HTML untuk keamanan
        linkify: true,
        typographer: true,
        highlight: function (str, lang) {
            if (lang && hljs.getLanguage(lang)) {
                try {
                    return '<pre class="hljs"><code>' +
                           hljs.highlight(str, { language: lang, ignoreIllegals: true }).value +
                           '</code></pre>';
                } catch (__) {}
            }
            return '<pre class="hljs"><code>' + DOMPurify.sanitize(str) + '</code></pre>';
        }
    });

    // State Management
    const state = {
        storedFiles: [],
        openTabs: [],
        activeFileId: null,
        recentFiles: [],
        isModified: false,
        currentTheme: 'dark',
        showPreview: true,
        splitView: false,
        selectedCommandIndex: 0,
        codeEditorView: null,      // CodeMirror view untuk kode
        mdEditorView: null,        // CodeMirror view untuk Markdown source
    };

    // File Templates
    const fileTemplates = {
        html: '<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Document</title>\n</head>\n<body>\n    \n</body>\n</html>',
        css: '/* CSS Styles */\n:root {\n    --primary: #007bff;\n}\n\nbody {\n    font-family: system-ui, sans-serif;\n}',
        js: '// JavaScript\ndocument.addEventListener("DOMContentLoaded", () => {\n    console.log("Hello World");\n});',
        md: '# Title\n\n## Subtitle\n\nWrite your content here...\n\n- Item 1\n- Item 2\n\n```javascript\nconsole.log("Hello");\n```\n\n> Quote text\n\n| Col 1 | Col 2 |\n|-------|-------|\n| Data  | Data  |',
        json: '{\n    "name": "project",\n    "version": "1.0.0"\n}',
        xml: '<?xml version="1.0" encoding="UTF-8"?>\n<root>\n    \n</root>',
        yaml: '# YAML Config\nname: project\nversion: 1.0.0',
        py: '# Python\ndef main():\n    print("Hello World")\n\nif __name__ == "__main__":\n    main()',
        ts: '// TypeScript\ninterface User {\n    name: string;\n    age: number;\n}\n\nfunction greet(user: User): string {\n    return `Hello, ${user.name}!`;\n}'
    };

    const fileTypes = {
        html: { name: 'HTML', icon: 'html', mode: html },
        css: { name: 'CSS', icon: 'css', mode: css },
        js: { name: 'JavaScript', icon: 'js', mode: javascript },
        ts: { name: 'TypeScript', icon: 'ts', mode: javascript }, // gunakan js untuk TS
        md: { name: 'Markdown', icon: 'md', mode: markdown },
        json: { name: 'JSON', icon: 'json', mode: json },
        xml: { name: 'XML', icon: 'xml', mode: xml },
        yaml: { name: 'YAML', icon: 'yaml', mode: yaml },
        yml: { name: 'YAML', icon: 'yaml', mode: yaml },
        py: { name: 'Python', icon: 'py', mode: python },
        txt: { name: 'Plain Text', icon: 'default', mode: null } // plain text = no language
    };

    // DOM elements
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    const els = {
        fileTabs: $('#fileTabs'),
        fileTree: $('#fileTree'),
        sidebar: $('#sidebar'),
        sidebarOverlay: $('#sidebarOverlay'),
        welcomeScreen: $('#welcomeScreen'),
        codeEditorWrapper: $('#codeEditorWrapper'),
        lineNumbers: $('#lineNumbers'),
        markdownWrapper: $('#markdownWrapper'),
        markdownPreview: $('#markdownPreview'),
        formatToolbar: $('#formatToolbar'),
        viewToolbar: $('#viewToolbar'),
        codeToolbar: $('#codeToolbar'),
        statusLine: $('#statusLine'),
        statusFileType: $('#statusFileType'),
        commandPalette: $('#commandPalette'),
        commandInput: $('#commandInput'),
        commandResults: $('#commandResults'),
        newFileModal: $('#newFileModal'),
        exportModal: $('#exportModal'),
        toastContainer: $('#toastContainer'),
        fileInput: $('#fileInput'),
        recentFiles: $('#recentFiles'),
        recentFilesList: $('#recentFilesList'),
        splitResize: $('#splitResize'),
        markdownEditorPane: $('#markdownEditorPane'),
        markdownPreviewPane: $('#markdownPreviewPane')
    };

    // ============================================================
    //  Utility
    // ============================================================
    function generateId() {
        return 'file_' + Math.random().toString(36).substring(2, 11) + '_' + Date.now().toString(36);
    }

    function getFileExtension(filename) {
        return filename.split('.').pop().toLowerCase();
    }

    function getFileTypeInfo(filename) {
        const ext = getFileExtension(filename);
        return fileTypes[ext] || fileTypes.txt;
    }

    function getFileIconHTML(fileType) {
        return `<span class="file-icon ${fileType.icon}">${fileType.name.charAt(0)}</span>`;
    }

    function escapeHTML(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function getStoredFileById(id) {
        return state.storedFiles.find(f => f.id === id);
    }

    function getStoredFileByName(name) {
        return state.storedFiles.find(f => f.name === name);
    }

    // Toast
    function showToast(message, type = 'info') {
        const icons = {
            success: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
            error: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" x2="9" y1="9" y2="15"/><line x1="9" x2="15" y1="9" y2="15"/></svg>',
            warning: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>',
            info: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></svg>'
        };
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `${icons[type]}<span>${message}</span>`;
        els.toastContainer.appendChild(toast);
        setTimeout(() => {
            toast.style.animation = 'slideInToast 0.3s ease reverse';
            toast.addEventListener('animationend', () => toast.remove(), { once: true });
            setTimeout(() => toast.remove(), 350);
        }, 3000);
    }

    // ============================================================
    //  Theme
    // ============================================================
    function toggleTheme() {
        state.currentTheme = state.currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', state.currentTheme);
        localStorage.setItem('forgeTheme', state.currentTheme);
        applyEditorTheme();
        showToast(`Theme: ${state.currentTheme}`, 'info');
    }

    function loadTheme() {
        state.currentTheme = localStorage.getItem('forgeTheme') || 'dark';
        document.documentElement.setAttribute('data-theme', state.currentTheme);
    }

    function applyEditorTheme() {
        const isDark = state.currentTheme === 'dark';
        const theme = isDark ? oneDark : []; // light = no custom theme, pakai default CM
        if (state.codeEditorView) {
            state.codeEditorView.dispatch({
                effects: EditorView.theme(theme)
            });
        }
        if (state.mdEditorView) {
            state.mdEditorView.dispatch({
                effects: EditorView.theme(theme)
            });
        }
    }

    // ============================================================
    //  Penyimpanan (localStorage)
    // ============================================================
    function persistAllStoredFiles() {
        const data = {};
        state.storedFiles.forEach(f => {
            data[f.id] = { id: f.id, name: f.name, content: f.content, type: f.type, createdAt: f.createdAt, modifiedAt: f.modifiedAt };
        });
        try { localStorage.setItem('forgeFiles', JSON.stringify(data)); } catch (e) { showToast('Storage full', 'warning'); }
    }

    function loadSavedFiles() {
        try {
            const raw = localStorage.getItem('forgeFiles');
            if (!raw) return;
            const data = JSON.parse(raw);
            state.storedFiles = Object.values(data).map(fd => ({
                id: fd.id,
                name: fd.name,
                content: fd.content || '',
                type: fd.type || getFileExtension(fd.name),
                createdAt: fd.createdAt || new Date().toISOString(),
                modifiedAt: fd.modifiedAt || new Date().toISOString()
            }));
        } catch (e) { state.storedFiles = []; }
    }

    function loadRecentFiles() {
        try {
            const raw = localStorage.getItem('forgeRecentFiles');
            if (raw) state.recentFiles = JSON.parse(raw);
        } catch (e) { state.recentFiles = []; }
    }

    function persistRecentFiles() {
        try { localStorage.setItem('forgeRecentFiles', JSON.stringify(state.recentFiles)); } catch (e) {}
    }

    function addToRecentFiles(file) {
        state.recentFiles = state.recentFiles.filter(rf => rf.id !== file.id && rf.name !== file.name);
        state.recentFiles.unshift({ id: file.id, name: file.name, type: file.type, modifiedAt: file.modifiedAt });
        state.recentFiles = state.recentFiles.slice(0, 20);
        persistRecentFiles();
        renderRecentFiles();
    }

    function removeRecentFile(recentId) {
        state.recentFiles = state.recentFiles.filter(rf => rf.id !== recentId);
        persistRecentFiles();
        renderRecentFiles();
        showToast('Removed from recent files', 'info');
    }

    function clearAllRecentFiles() {
        if (confirm('Clear all recent files?')) {
            state.recentFiles = [];
            persistRecentFiles();
            renderRecentFiles();
            showToast('Recent files cleared', 'info');
        }
    }

    function findStoredFile(recentItem) {
        let file = getStoredFileById(recentItem.id);
        if (file) return file;
        file = getStoredFileByName(recentItem.name);
        if (file) {
            recentItem.id = file.id;
            persistRecentFiles();
            return file;
        }
        return null;
    }

    // ============================================================
    //  Manajemen Berkas
    // ============================================================
    function createFile(name, content = '', type = 'txt') {
        const file = {
            id: generateId(),
            name,
            content,
            type,
            createdAt: new Date().toISOString(),
            modifiedAt: new Date().toISOString()
        };
        state.storedFiles.push(file);
        persistAllStoredFiles();
        addToRecentFiles(file);
        openFileInTab(file.id);
        renderFileTree();
        renderFileTabs();
        return file;
    }

    function openFileInTab(fileId) {
        const file = getStoredFileById(fileId);
        if (!file) return;

        if (!state.openTabs.includes(fileId)) {
            state.openTabs.push(fileId);
        }

        // Simpan konten editor aktif sebelumnya
        saveActiveEditorContent();

        state.activeFileId = fileId;
        state.isModified = false;

        const fti = getFileTypeInfo(file.name);

        // Tampilkan editor yang sesuai
        els.welcomeScreen.style.display = 'none';

        if (file.type === 'md') {
            els.codeEditorWrapper.style.display = 'none';
            els.markdownWrapper.style.display = 'flex';
            // Set isi dan mode untuk Markdown editor
            if (state.mdEditorView) {
                state.mdEditorView.dispatch({
                    changes: { from: 0, to: state.mdEditorView.state.doc.length, insert: file.content }
                });
                // Ubah mode ke markdown
                state.mdEditorView.dispatch({
                    effects: EditorView.updateListener.of(() => {})
                });
                updateMarkdownPreview(file.content);
            }
            els.formatToolbar.style.display = 'flex';
            els.viewToolbar.style.display = 'flex';
            els.codeToolbar.style.display = 'none';
            els.statusFileType.textContent = 'Markdown';
        } else {
            els.codeEditorWrapper.style.display = 'flex';
            els.markdownWrapper.style.display = 'none';
            if (state.codeEditorView) {
                state.codeEditorView.dispatch({
                    changes: { from: 0, to: state.codeEditorView.state.doc.length, insert: file.content }
                });
                // Atur mode bahasa
                const langExtension = fti.mode ? fti.mode() : [];
                state.codeEditorView.dispatch({
                    effects: EditorView.updateListener.of(() => {})
                });
                // rekonfigurasi language
                state.codeEditorView.dispatch({
                    effects: state.languageCompartment.reconfigure(langExtension)
                });
            }
            els.formatToolbar.style.display = 'none';
            els.viewToolbar.style.display = 'none';
            els.codeToolbar.style.display = 'flex';
            els.statusFileType.textContent = fti.name;
        }

        updateStatusLine();
        renderFileTabs();
        renderFileTree();
        addToRecentFiles(file);

        setTimeout(() => {
            const view = file.type === 'md' ? state.mdEditorView : state.codeEditorView;
            if (view) view.focus();
        }, 50);
    }

    function saveActiveEditorContent() {
        if (!state.activeFileId) return;
        const file = getStoredFileById(state.activeFileId);
        if (!file) return;
        const view = file.type === 'md' ? state.mdEditorView : state.codeEditorView;
        if (view) {
            file.content = view.state.doc.toString();
            file.modifiedAt = new Date().toISOString();
        }
    }

    function closeTab(fileId) {
        if (!state.openTabs.includes(fileId)) return;

        if (state.activeFileId === fileId) saveActiveEditorContent();

        const tabIndex = state.openTabs.indexOf(fileId);
        state.openTabs.splice(tabIndex, 1);

        if (state.activeFileId === fileId) {
            if (state.openTabs.length > 0) {
                const nextId = state.openTabs[Math.max(0, tabIndex - 1)];
                openFileInTab(nextId);
            } else {
                state.activeFileId = null;
                showWelcomeScreen();
            }
        }

        persistAllStoredFiles();
        renderFileTabs();
        renderFileTree();
    }

    function deleteFilePermanently(fileId) {
        if (state.openTabs.includes(fileId)) closeTab(fileId);
        state.storedFiles = state.storedFiles.filter(f => f.id !== fileId);
        state.recentFiles = state.recentFiles.filter(rf => rf.id !== fileId);
        const file = getStoredFileById(fileId);
        if (file) state.recentFiles = state.recentFiles.filter(rf => rf.name !== file.name);
        persistRecentFiles();
        persistAllStoredFiles();
        renderFileTree();
        renderFileTabs();
        renderRecentFiles();
        showToast('File deleted permanently', 'info');
    }

    function saveFile() {
        if (!state.activeFileId) { showToast('No file to save', 'warning'); return; }
        const file = getStoredFileById(state.activeFileId);
        if (!file) return;
        const view = file.type === 'md' ? state.mdEditorView : state.codeEditorView;
        if (view) {
            file.content = view.state.doc.toString();
            file.modifiedAt = new Date().toISOString();
            state.isModified = false;
            persistAllStoredFiles();
            addToRecentFiles(file);
            showToast(`"${file.name}" saved`, 'success');
        }
    }

    function importFileFromDisk(diskFile) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const ext = getFileExtension(diskFile.name);
            const content = event.target.result;
            const existing = state.storedFiles.find(f => f.name === diskFile.name);
            if (existing) {
                existing.content = content;
                existing.modifiedAt = new Date().toISOString();
                persistAllStoredFiles();
                addToRecentFiles(existing);
                if (!state.openTabs.includes(existing.id)) state.openTabs.push(existing.id);
                openFileInTab(existing.id);
                renderFileTree();
                showToast(`Updated "${diskFile.name}"`, 'success');
            } else {
                createFile(diskFile.name, content, ext);
                showToast(`Imported "${diskFile.name}"`, 'success');
            }
        };
        reader.readAsText(diskFile);
    }

    function showWelcomeScreen() {
        els.welcomeScreen.style.display = 'flex';
        els.codeEditorWrapper.style.display = 'none';
        els.markdownWrapper.style.display = 'none';
        els.formatToolbar.style.display = 'none';
        els.viewToolbar.style.display = 'none';
        els.codeToolbar.style.display = 'none';
        els.statusFileType.textContent = 'Plain Text';
        els.statusLine.textContent = 'Ln1, Col 1';
        renderRecentFiles();
    }

    // ============================================================
    //  Rendering UI
    // ============================================================
    function renderFileTabs() {
        els.fileTabs.innerHTML = state.openTabs.map(fileId => {
            const file = getStoredFileById(fileId);
            if (!file) return '';
            const isActive = state.activeFileId === fileId;
            const fti = getFileTypeInfo(file.name);
            return `
                <button class="file-tab ${isActive ? 'active' : ''}" data-file-id="${fileId}">
                    ${getFileIconHTML(fti)}
                    <span>${escapeHTML(file.name)}</span>
                    <span class="close-tab" data-close-id="${fileId}">✕</span>
                </button>`;
        }).join('');

        els.fileTabs.querySelectorAll('.file-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                const closeBtn = e.target.closest('.close-tab');
                if (closeBtn) { closeTab(closeBtn.dataset.closeId); return; }
                if (tab.dataset.fileId !== state.activeFileId) openFileInTab(tab.dataset.fileId);
            });
        });
    }

    function renderFileTree() {
        const sorted = [...state.storedFiles].sort((a, b) => a.name.localeCompare(b.name));
        els.fileTree.innerHTML = sorted.map(file => {
            const fti = getFileTypeInfo(file.name);
            const isActive = state.activeFileId === file.id;
            const isOpen = state.openTabs.includes(file.id);
            return `
                <li class="file-tree-item ${isActive ? 'active' : ''}" data-file-id="${file.id}">
                    ${getFileIconHTML(fti)}
                    <span class="file-name" title="${escapeHTML(file.name)}">${escapeHTML(file.name)}</span>
                    ${isOpen ? '<span class="file-badge" style="background:var(--success);font-size:0.5rem;">●</span>' : ''}
                    <button class="icon-btn delete-file-btn" data-delete-id="${file.id}" title="Delete permanently" style="width:24px;height:24px;border:none;opacity:0.5;margin-left:auto;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                    </button>
                </li>`;
        }).join('');

        els.fileTree.querySelectorAll('.file-tree-item').forEach(item => {
            item.addEventListener('click', (e) => {
                if (e.target.closest('.delete-file-btn')) return;
                openFileInTab(item.dataset.fileId);
                if (window.innerWidth <= 768) closeSidebar();
            });
        });
        els.fileTree.querySelectorAll('.delete-file-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const fid = btn.dataset.deleteId;
                const file = getStoredFileById(fid);
                if (file && confirm(`Delete "${file.name}" permanently?`)) deleteFilePermanently(fid);
            });
        });
    }

    function renderRecentFiles() {
        if (!state.recentFiles.length) { els.recentFiles.style.display = 'none'; return; }
        els.recentFiles.style.display = 'block';
        els.recentFilesList.innerHTML = state.recentFiles.map(rf => {
            const fti = getFileTypeInfo(rf.name);
            const file = findStoredFile(rf);
            const exists = !!file;
            return `
                <div class="recent-file-item" data-recent-id="${rf.id}">
                    ${getFileIconHTML(fti)}
                    <div class="recent-file-info" style="cursor:pointer;flex:1;min-width:0;">
                        <div class="recent-file-name">${escapeHTML(rf.name)}</div>
                        <div class="recent-file-meta">${formatDate(rf.modifiedAt)}${!exists ? ' (deleted)' : ''}</div>
                    </div>
                    <button class="icon-btn remove-recent-btn" data-remove-id="${rf.id}" style="width:24px;height:24px;border:none;opacity:0.4;">✕</button>
                </div>`;
        }).join('');
        if (state.recentFiles.length > 1) {
            els.recentFilesList.innerHTML += `<button id="clearAllRecent" class="welcome-btn" style="width:100%;margin-top:8px;">Clear All Recent</button>`;
            $('#clearAllRecent')?.addEventListener('click', clearAllRecentFiles);
        }
        els.recentFilesList.querySelectorAll('.recent-file-info').forEach(info => {
            info.addEventListener('click', (e) => {
                const recentId = e.target.closest('.recent-file-item')?.dataset.recentId;
                const rf = state.recentFiles.find(r => r.id === recentId);
                if (!rf) return;
                const file = findStoredFile(rf);
                if (file) openFileInTab(file.id);
                else showToast('File no longer exists', 'warning');
            });
        });
        els.recentFilesList.querySelectorAll('.remove-recent-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                removeRecentFile(btn.dataset.removeId);
            });
        });
    }

    function updateStatusLine() {
        const file = state.activeFileId ? getStoredFileById(state.activeFileId) : null;
        const view = (file && file.type === 'md') ? state.mdEditorView : state.codeEditorView;
        if (!view) { els.statusLine.textContent = 'Ln1, Col 1'; return; }
        const pos = view.state.selection.main.head;
        const line = view.state.doc.lineAt(pos);
        els.statusLine.textContent = `Ln ${line.number}, Col ${pos - line.from + 1}`;
    }

    function updateMarkdownPreview(mdContent = null) {
        if (!mdContent && state.mdEditorView) {
            mdContent = state.mdEditorView.state.doc.toString();
        }
        if (mdContent === null) return;
        const html = md.render(mdContent);
        els.markdownPreview.innerHTML = DOMPurify.sanitize(html);
    }

    // ============================================================
    //  Command Palette
    // ============================================================
    const commands = [
        { name: 'New File', shortcut: 'Ctrl+N', action: () => openModal('newFileModal') },
        { name: 'Open File', shortcut: 'Ctrl+O', action: () => els.fileInput.click() },
        { name: 'Save File', shortcut: 'Ctrl+S', action: () => saveFile() },
        { name: 'Toggle Theme', shortcut: '', action: () => toggleTheme() },
        { name: 'Toggle Sidebar', shortcut: 'Ctrl+B', action: () => toggleSidebar() },
        { name: 'Format Code', shortcut: 'Alt+Shift+F', action: () => formatCode() },
        { name: 'Minify Code', shortcut: '', action: () => minifyCode() },
        { name: 'Export as HTML', shortcut: '', action: () => exportFile('html') },
        { name: 'Export as Markdown', shortcut: '', action: () => exportFile('md') },
        { name: 'Export as Text', shortcut: '', action: () => exportFile('txt') },
        { name: 'Toggle Preview', shortcut: 'Ctrl+P', action: () => togglePreview() },
        { name: 'Split View', shortcut: '', action: () => toggleSplitView() },
        { name: 'Close Active Tab', shortcut: '', action: () => { if (state.activeFileId) closeTab(state.activeFileId); } },
        { name: 'Clear All Recent Files', shortcut: '', action: () => clearAllRecentFiles() },
    ];

    function openCommandPalette() {
        els.commandPalette.classList.add('active');
        els.commandInput.value = '';
        els.commandInput.focus();
        state.selectedCommandIndex = 0;
        renderCommandResults('');
    }

    function closeCommandPalette() {
        els.commandPalette.classList.remove('active');
    }

    function renderCommandResults(filter) {
        const filtered = commands.filter(cmd => cmd.name.toLowerCase().includes(filter.toLowerCase()));
        state.selectedCommandIndex = Math.min(state.selectedCommandIndex, Math.max(0, filtered.length - 1));
        els.commandResults.innerHTML = filtered.map((cmd, i) => `
            <div class="command-item ${i === state.selectedCommandIndex ? 'selected' : ''}" data-cmd-index="${i}">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                <span class="command-name">${cmd.name}</span>
                <span class="command-shortcut">${cmd.shortcut}</span>
            </div>`).join('');
        els.commandResults._filtered = filtered;
        els.commandResults.querySelectorAll('.command-item').forEach(item => {
            item.addEventListener('click', () => {
                const idx = parseInt(item.dataset.cmdIndex);
                filtered[idx]?.action();
                closeCommandPalette();
            });
            item.addEventListener('mouseenter', () => {
                state.selectedCommandIndex = parseInt(item.dataset.cmdIndex);
                updateCommandSelection();
            });
        });
    }

    function updateCommandSelection() {
        els.commandResults.querySelectorAll('.command-item').forEach((item, i) => {
            item.classList.toggle('selected', i === state.selectedCommandIndex);
        });
        els.commandResults.querySelector('.command-item.selected')?.scrollIntoView({ block: 'nearest' });
    }

    function executeSelectedCommand() {
        const filtered = els.commandResults._filtered || [];
        filtered[state.selectedCommandIndex]?.action();
        closeCommandPalette();
    }

    // ============================================================
    //  Modal & Export
    // ============================================================
    function openModal(id) { document.getElementById(id)?.classList.add('active'); }
    function closeModal(id) { document.getElementById(id)?.classList.remove('active'); }
    function closeAllModals() { $$('.modal-overlay.active').forEach(m => m.classList.remove('active')); }

    function exportFile(format) {
        if (!state.activeFileId) { showToast('No file to export', 'error'); return; }
        const file = getStoredFileById(state.activeFileId);
        if (!file) return;
        const view = file.type === 'md' ? state.mdEditorView : state.codeEditorView;
        const content = view ? view.state.doc.toString() : file.content;
        let blob, filename;
        switch (format) {
            case 'html':
                const htmlContent = file.type === 'md' ? els.markdownPreview.innerHTML : `<pre>${escapeHTML(content)}</pre>`;
                blob = new Blob([`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${escapeHTML(file.name)}</title><style>body{font-family:sans-serif;max-width:800px;margin:40px auto;padding:20px;line-height:1.6} pre{background:#f4f4f4;padding:16px;border-radius:8px}</style></head><body>${htmlContent}</body></html>`], { type: 'text/html' });
                filename = file.name.replace(/\.\w+$/, '.html');
                break;
            case 'md':
                blob = new Blob([content], { type: 'text/markdown' });
                filename = file.name.replace(/\.\w+$/, '.md');
                break;
            case 'txt':
                blob = new Blob([content], { type: 'text/plain' });
                filename = file.name.replace(/\.\w+$/, '.txt');
                break;
            case 'pdf':
                showToast('Use browser print (Ctrl+P) to save as PDF', 'info');
                window.print();
                closeModal('exportModal');
                return;
        }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast(`Exported as ${filename}`, 'success');
        closeModal('exportModal');
    }

    // ============================================================
    //  Code Formatting sederhana (dengan CodeMirror document)
    // ============================================================
    function formatCode() {
        const view = state.codeEditorView;
        if (!view) return;
        const content = view.state.doc.toString();
        let formatted = content;
        const file = getStoredFileById(state.activeFileId);
        if (!file) return;
        switch (file.type) {
            case 'json': try { formatted = JSON.stringify(JSON.parse(content), null, 2); } catch (e) {} break;
            case 'js': case 'ts': formatted = content.replace(/;\s*/g, ';\n').replace(/{\s*/g, ' {\n  ').replace(/\s*}/g, '\n}'); break;
            case 'css': formatted = content.replace(/{\s*/g, ' {\n  ').replace(/\s*}/g, '\n}\n').replace(/;\s*/g, ';\n  '); break;
            case 'html': formatted = content.replace(/>\s+</g, '>\n<'); break;
        }
        view.dispatch({ changes: { from: 0, to: view.state.doc.length, insert: formatted } });
        showToast('Code formatted', 'success');
    }

    function minifyCode() {
        const view = state.codeEditorView;
        if (!view) return;
        const content = view.state.doc.toString();
        const minified = content.replace(/\s+/g, ' ').replace(/\s*([{};:,])\s*/g, '$1').trim();
        view.dispatch({ changes: { from: 0, to: view.state.doc.length, insert: minified } });
        showToast('Code minified', 'success');
    }

    // ============================================================
    //  View Toggles
    // ============================================================
    function toggleSidebar() {
        if (window.innerWidth <= 768) {
            if (els.sidebar.classList.contains('open')) closeSidebar();
            else { els.sidebar.classList.add('open'); els.sidebar.classList.remove('collapsed'); els.sidebarOverlay.classList.add('active'); }
        } else {
            els.sidebar.classList.toggle('collapsed');
        }
    }

    function closeSidebar() {
        els.sidebar.classList.remove('open');
        els.sidebar.classList.add('collapsed');
        els.sidebarOverlay.classList.remove('active');
    }

    function togglePreview() {
        if (!state.activeFileId) return;
        const file = getStoredFileById(state.activeFileId);
        if (!file || file.type !== 'md') return;
        state.showPreview = !state.showPreview;
        els.markdownPreviewPane.style.display = state.showPreview ? 'flex' : 'none';
        els.splitResize.style.display = state.showPreview && state.splitView ? 'flex' : 'none';
        showToast(state.showPreview ? 'Preview shown' : 'Preview hidden', 'info');
    }

    function toggleSplitView() {
        if (!state.activeFileId) return;
        const file = getStoredFileById(state.activeFileId);
        if (!file || file.type !== 'md') return;
        state.splitView = !state.splitView;
        if (state.splitView) {
            els.markdownPreviewPane.style.display = 'flex';
            els.splitResize.style.display = 'flex';
            els.markdownEditorPane.style.flex = '1';
            els.markdownPreviewPane.style.flex = '1';
        } else {
            els.markdownPreviewPane.style.display = state.showPreview ? 'flex' : 'none';
            els.splitResize.style.display = 'none';
            els.markdownEditorPane.style.flex = '';
            els.markdownPreviewPane.style.flex = '';
        }
        showToast(state.splitView ? 'Split view enabled' : 'Split view disabled', 'info');
    }

    // ============================================================
    //  Inisialisasi CodeMirror Editor
    // ============================================================
    function initEditors() {
        // Compartment untuk language (bisa di-reconfigure)
        state.languageCompartment = new Compartment();

        // Container untuk code editor
        const codeContainer = document.createElement('div');
        codeContainer.style.height = '100%';
        els.codeEditorWrapper.innerHTML = ''; // hapus textarea dan line numbers lama
        els.codeEditorWrapper.appendChild(codeContainer);

        state.codeEditorView = new EditorView({
            state: EditorState.create({
                doc: '',
                extensions: [
                    basicSetup,
                    state.languageCompartment.of([]),
                    EditorView.updateListener.of(update => {
                        if (update.docChanged) {
                            state.isModified = true;
                            if (state.activeFileId) {
                                const file = getStoredFileById(state.activeFileId);
                                if (file) file.content = update.state.doc.toString();
                            }
                        }
                        updateStatusLine();
                    }),
                    EditorView.theme(state.currentTheme === 'dark' ? oneDark : []),
                ]
            }),
            parent: codeContainer
        });

        // Container untuk Markdown source editor
        const mdContainer = document.createElement('div');
        mdContainer.style.height = '100%';
        els.markdownEditorPane.innerHTML = ''; // hapus textarea lama
        els.markdownEditorPane.appendChild(mdContainer);

        state.mdEditorView = new EditorView({
            state: EditorState.create({
                doc: '',
                extensions: [
                    basicSetup,
                    markdown(),
                    EditorView.updateListener.of(update => {
                        if (update.docChanged) {
                            state.isModified = true;
                            updateMarkdownPreview();
                            if (state.activeFileId) {
                                const file = getStoredFileById(state.activeFileId);
                                if (file) file.content = update.state.doc.toString();
                            }
                        }
                        updateStatusLine();
                    }),
                    EditorView.theme(state.currentTheme === 'dark' ? oneDark : []),
                ]
            }),
            parent: mdContainer
        });

        applyEditorTheme();
    }

    // ============================================================
    //  Event Listeners
    // ============================================================
    function initEventListeners() {
        $('#toggleTheme').addEventListener('click', toggleTheme);
        $('#toggleSidebar').addEventListener('click', toggleSidebar);
        els.sidebarOverlay.addEventListener('click', closeSidebar);

        $('#openCommandPalette').addEventListener('click', openCommandPalette);
        els.commandInput.addEventListener('input', (e) => { state.selectedCommandIndex = 0; renderCommandResults(e.target.value); });
        els.commandInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { closeCommandPalette(); return; }
            if (e.key === 'Enter') { e.preventDefault(); executeSelectedCommand(); return; }
            if (e.key === 'ArrowDown') { e.preventDefault(); const filtered = els.commandResults._filtered || []; state.selectedCommandIndex = Math.min(state.selectedCommandIndex + 1, Math.max(0, filtered.length - 1)); updateCommandSelection(); }
            if (e.key === 'ArrowUp') { e.preventDefault(); state.selectedCommandIndex = Math.max(state.selectedCommandIndex - 1, 0); updateCommandSelection(); }
        });
        document.addEventListener('keydown', (e) => { if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openCommandPalette(); } });
        document.addEventListener('click', (e) => { if (els.commandPalette.classList.contains('active') && !els.commandPalette.contains(e.target) && e.target !== $('#openCommandPalette')) closeCommandPalette(); });

        $('#newFile').addEventListener('click', () => openModal('newFileModal'));
        $('#welcomeNewFile').addEventListener('click', () => openModal('newFileModal'));
        $('#closeNewFileModal').addEventListener('click', () => closeModal('newFileModal'));
        $('#cancelNewFile').addEventListener('click', () => closeModal('newFileModal'));
        $('#createNewFile').addEventListener('click', () => {
            const nameInput = $('#newFileName');
            const typeSelect = $('#newFileType');
            let name = nameInput.value.trim() || 'untitled';
            const type = typeSelect.value;
            if (!name.includes('.')) name += '.' + type;
            const template = fileTemplates[type] || '';
            createFile(name, template, type);
            closeModal('newFileModal');
            nameInput.value = '';
        });
        $('#newFileType').addEventListener('change', (e) => {
            const nameInput = $('#newFileName');
            const name = nameInput.value.trim() || 'untitled';
            if (!name.includes('.')) nameInput.value = name + '.' + e.target.value;
        });
        $('#newFileName').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('#createNewFile').click(); });

        $('#welcomeOpenFile').addEventListener('click', () => els.fileInput.click());
        els.fileInput.addEventListener('change', (e) => {
            Array.from(e.target.files).forEach(file => importFileFromDisk(file));
            e.target.value = '';
        });

        $('#btnSave').addEventListener('click', saveFile);
        $('#btnExport').addEventListener('click', () => openModal('exportModal'));
        $('#closeExportModal').addEventListener('click', () => closeModal('exportModal'));
        $('#cancelExport').addEventListener('click', () => closeModal('exportModal'));
        $('#confirmExport').addEventListener('click', () => exportFile($('#exportFormat').value));

        $('#btnUndo').addEventListener('click', () => { const v = state.activeFileId ? (getStoredFileById(state.activeFileId)?.type === 'md' ? state.mdEditorView : state.codeEditorView) : null; if (v) v.dispatch({ changes: { from: 0, to: 0, insert: '' } }); });
        // Undo/Redo sederhana menggunakan history CodeMirror bawaan (basicSetup sudah include)
        $('#btnUndo').addEventListener('click', () => { const v = state.activeFileId ? (getStoredFileById(state.activeFileId)?.type === 'md' ? state.mdEditorView : state.codeEditorView) : null; if (v) v.dispatch({ effects: EditorView.historyUndo.of(null) }); });
        $('#btnRedo').addEventListener('click', () => { const v = state.activeFileId ? (getStoredFileById(state.activeFileId)?.type === 'md' ? state.mdEditorView : state.codeEditorView) : null; if (v) v.dispatch({ effects: EditorView.historyRedo.of(null) }); });

        $('#btnPreview').addEventListener('click', togglePreview);
        $('#btnSplit').addEventListener('click', toggleSplitView);
        $('#btnFormat').addEventListener('click', formatCode);
        $('#btnMinify').addEventListener('click', minifyCode);

        // Global shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                switch (e.key.toLowerCase()) {
                    case 'n': e.preventDefault(); openModal('newFileModal'); break;
                    case 's': e.preventDefault(); saveFile(); break;
                    case 'o': e.preventDefault(); els.fileInput.click(); break;
                    case 'b': e.preventDefault(); toggleSidebar(); break;
                    case 'p': e.preventDefault(); if (state.activeFileId && getStoredFileById(state.activeFileId)?.type === 'md') togglePreview(); break;
                }
            }
            if (e.key === 'Escape') { closeCommandPalette(); closeAllModals(); closeSidebar(); }
        });

        // Split resize (tetap seperti sebelumnya)
        let isResizing = false;
        els.splitResize.addEventListener('mousedown', (e) => { isResizing = true; e.preventDefault(); });
        els.splitResize.addEventListener('touchstart', (e) => { isResizing = true; e.preventDefault(); });
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const rect = els.markdownWrapper.getBoundingClientRect();
            if (window.innerWidth > 768) {
                const pct = Math.max(20, Math.min(80, ((e.clientX - rect.left) / rect.width) * 100));
                els.markdownEditorPane.style.flex = `0 0 ${pct}%`;
                els.markdownPreviewPane.style.flex = `0 0 ${100 - pct}%`;
            } else {
                const pct = Math.max(20, Math.min(80, ((e.clientY - rect.top) / rect.height) * 100));
                els.markdownEditorPane.style.flex = `0 0 ${pct}%`;
                els.markdownPreviewPane.style.flex = `0 0 ${100 - pct}%`;
            }
        });
        document.addEventListener('touchmove', (e) => {
            if (!isResizing) return;
            const rect = els.markdownWrapper.getBoundingClientRect();
            const touch = e.touches[0];
            if (window.innerWidth > 768) {
                const pct = Math.max(20, Math.min(80, ((touch.clientX - rect.left) / rect.width) * 100));
                els.markdownEditorPane.style.flex = `0 0 ${pct}%`;
                els.markdownPreviewPane.style.flex = `0 0 ${100 - pct}%`;
            } else {
                const pct = Math.max(20, Math.min(80, ((touch.clientY - rect.top) / rect.height) * 100));
                els.markdownEditorPane.style.flex = `0 0 ${pct}%`;
                els.markdownPreviewPane.style.flex = `0 0 ${100 - pct}%`;
            }
        });
        document.addEventListener('mouseup', () => { isResizing = false; });
        document.addEventListener('touchend', () => { isResizing = false; });

        $$('.modal-overlay').forEach(overlay => overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('active'); }));
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                els.sidebar.classList.remove('open'); els.sidebarOverlay.classList.remove('active');
                els.markdownWrapper.style.flexDirection = '';
            } else {
                els.markdownWrapper.style.flexDirection = 'column';
            }
        });
        if (window.innerWidth <= 768) els.markdownWrapper.style.flexDirection = 'column';
    }

    // ============================================================
    //  Init
    // ============================================================
    function init() {
        loadTheme();
        loadSavedFiles();
        loadRecentFiles();
        initEditors();
        initEventListeners();

        renderFileTree();
        renderRecentFiles();

        if (state.storedFiles.length > 0) {
            const firstFile = state.storedFiles[0];
            state.openTabs = [firstFile.id];
            state.activeFileId = firstFile.id;
            openFileInTab(firstFile.id);
        } else {
            showWelcomeScreen();
        }

        if (window.innerWidth > 768) {
            els.sidebar.classList.remove('collapsed', 'open');
        }

        window.addEventListener('beforeunload', () => {
            saveActiveEditorContent();
            persistAllStoredFiles();
        });

        setInterval(() => {
            if (state.activeFileId && state.isModified) {
                saveActiveEditorContent();
                persistAllStoredFiles();
            }
        }, 10000);
    }

    init();
</script>
</body>
</html>
